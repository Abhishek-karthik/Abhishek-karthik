<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <style>
      .star { animation: twinkle var(--d, 2s) ease-in-out infinite alternate; }
      @keyframes twinkle {
        from { opacity: 0.1; transform: scale(0.8); }
        to   { opacity: 1;   transform: scale(1.3); }
      }
      @keyframes floatA {
        0%,100% { transform: translate(0px, 0px)   scale(1);   }
        33%      { transform: translate(40px, -25px) scale(1.1); }
        66%      { transform: translate(-30px, 20px) scale(0.9); }
      }
      @keyframes floatB {
        0%,100% { transform: translate(0px, 0px)    scale(1);   }
        50%      { transform: translate(-50px, 35px) scale(1.15); }
      }
      @keyframes floatC {
        0%,100% { transform: translate(0px, 0px)   scale(1);   }
        40%      { transform: translate(20px, -40px) scale(0.95); }
        80%      { transform: translate(-15px, 15px) scale(1.1); }
      }
      .orb-a { animation: floatA 8s ease-in-out infinite; }
      .orb-b { animation: floatB 10s ease-in-out infinite; }
      .orb-c { animation: floatC 7s ease-in-out infinite; }
      .name {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 68px;
        font-weight: 900;
        letter-spacing: -1px;
      }
      .sub {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 5px;
        text-transform: uppercase;
      }
    </style>

    <!-- Animated name gradient (Emerald to Cyan to Blue) -->
    <linearGradient id="nameG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#10B981"><animate attributeName="stop-color" values="#10B981;#06B6D4;#3B82F6;#10B981" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="50%"  stop-color="#06B6D4"><animate attributeName="stop-color" values="#06B6D4;#3B82F6;#10B981;#06B6D4" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#3B82F6"><animate attributeName="stop-color" values="#3B82F6;#10B981;#06B6D4;#3B82F6" dur="6s" repeatCount="indefinite"/></stop>
    </linearGradient>

    <!-- Subtitle gradient -->
    <linearGradient id="subG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#34D399"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <!-- Orb gradients -->
    <radialGradient id="orbEmerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#10B981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <filter id="textGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="280" fill="#0B1120"/>
  <!-- Minimal tech dots pattern -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05" />
  </pattern>
  <rect width="1200" height="280" fill="url(#dots)"/>

  <!-- === ANIMATED ORBS (AURORA EFFECT) === -->
  <g class="orb-a"><ellipse cx="150"  cy="180" rx="280" ry="200" fill="url(#orbBlue)"/></g>
  <g class="orb-b"><ellipse cx="1000" cy="100" rx="300" ry="220" fill="url(#orbCyan)"/></g>
  <g class="orb-c"><ellipse cx="600"  cy="250" rx="350" ry="150" fill="url(#orbEmerald)"/></g>

  <!-- === TWINKLING STARS === -->
  <circle class="star" style="--d:1.8s" cx="80"   cy="50"  r="1.5" fill="#34D399" opacity="0.8"/>
  <circle class="star" style="--d:3.1s" cx="220"  cy="30"  r="2"   fill="#f8fafc" opacity="0.6"/>
  <circle class="star" style="--d:1.5s" cx="350"  cy="80"  r="1"   fill="#60A5FA" opacity="0.9"/>
  <circle class="star" style="--d:2.4s" cx="500"  cy="40"  r="1.5" fill="#f8fafc" opacity="0.5"/>
  <circle class="star" style="--d:4.2s" cx="800"  cy="70"  r="1"   fill="#34D399" opacity="0.7"/>
  <circle class="star" style="--d:2.1s" cx="950"  cy="20"  r="2"   fill="#f8fafc" opacity="0.8"/>
  <circle class="star" style="--d:1.7s" cx="1120" cy="90"  r="1.5" fill="#60A5FA" opacity="0.6"/>

  <circle class="star" style="--d:2.8s" cx="120"  cy="240" r="1.5" fill="#f8fafc" opacity="0.5"/>
  <circle class="star" style="--d:3.5s" cx="300"  cy="210" r="1"   fill="#34D399" opacity="0.8"/>
  <circle class="star" style="--d:1.9s" cx="850"  cy="230" r="2"   fill="#60A5FA" opacity="0.6"/>
  <circle class="star" style="--d:4.0s" cx="1080" cy="250" r="1.5" fill="#f8fafc" opacity="0.7"/>

  <!-- === DECORATIVE LINES === -->
  <line x1="0" y1="278" x2="1200" y2="278" stroke="url(#nameG)" stroke-width="4" stroke-opacity="0.8"/>

  <!-- === NAME TEXT === -->
  <!-- Glow shadow layer -->
  <text class="name" x="600" y="155" text-anchor="middle" fill="url(#nameG)" opacity="0.5" filter="url(#textGlow)">Abhishek Karthik J</text>
  <!-- Crisp layer -->
  <text class="name" x="600" y="155" text-anchor="middle" fill="#FFFFFF" filter="url(#softGlow)">Abhishek Karthik J</text>

  <!-- Divider line -->
  <line x1="450" y1="185" x2="750" y2="185" stroke="url(#subG)" stroke-width="2" stroke-opacity="0.6"/>

  <!-- === SUBTITLE === -->
  <text class="sub" x="600" y="220" text-anchor="middle" fill="url(#subG)" filter="url(#softGlow)">Chennai, India  |  Data & Engineering</text>
</svg>
