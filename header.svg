<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <style>
      .star { animation: twinkle var(--d, 2s) ease-in-out infinite alternate; }
      @keyframes twinkle {
        from { opacity: 0.1; transform: scale(0.8); }
        to   { opacity: 1;   transform: scale(1.3); }
      }
      @keyframes floatA {
        0%,100% { transform: translate(0px, 0px)   scale(1);   }
        33%      { transform: translate(40px, -25px) scale(1.1); }
        66%      { transform: translate(-30px, 20px) scale(0.9); }
      }
      @keyframes floatB {
        0%,100% { transform: translate(0px, 0px)    scale(1);   }
        50%      { transform: translate(-50px, 35px) scale(1.15); }
      }
      @keyframes floatC {
        0%,100% { transform: translate(0px, 0px)   scale(1);   }
        40%      { transform: translate(20px, -40px) scale(0.95); }
        80%      { transform: translate(-15px, 15px) scale(1.1); }
      }
      .orb-a { animation: floatA 7s ease-in-out infinite; }
      .orb-b { animation: floatB 9s ease-in-out infinite; }
      .orb-c { animation: floatC 6s ease-in-out infinite; }
      .name {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 62px;
        font-weight: 800;
        letter-spacing: -2px;
      }
      .sub {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 16px;
        font-weight: 400;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
    </style>

    <!-- Animated name gradient -->
    <linearGradient id="nameG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f97316"><animate attributeName="stop-color" values="#f97316;#0ea5e9;#a855f7;#f97316" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="50%"  stop-color="#ec4899"><animate attributeName="stop-color" values="#ec4899;#a855f7;#0ea5e9;#ec4899" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#0ea5e9"><animate attributeName="stop-color" values="#0ea5e9;#f97316;#ec4899;#0ea5e9" dur="5s" repeatCount="indefinite"/></stop>
    </linearGradient>

    <!-- Subtitle gradient -->
    <linearGradient id="subG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Orb gradients -->
    <radialGradient id="orbPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ec4899" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for text -->
    <filter id="textGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="280" fill="#080c14"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="56"  x2="1200" y2="56"/>
    <line x1="0" y1="112" x2="1200" y2="112"/>
    <line x1="0" y1="168" x2="1200" y2="168"/>
    <line x1="0" y1="224" x2="1200" y2="224"/>
    <line x1="150"  y1="0" x2="150"  y2="280"/>
    <line x1="300"  y1="0" x2="300"  y2="280"/>
    <line x1="450"  y1="0" x2="450"  y2="280"/>
    <line x1="600"  y1="0" x2="600"  y2="280"/>
    <line x1="750"  y1="0" x2="750"  y2="280"/>
    <line x1="900"  y1="0" x2="900"  y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
  </g>

  <!-- === ANIMATED ORBS === -->
  <g class="orb-a"><ellipse cx="120"  cy="160" rx="220" ry="220" fill="url(#orbPurple)"/></g>
  <g class="orb-b"><ellipse cx="1080" cy="120" rx="240" ry="240" fill="url(#orbCyan)"/></g>
  <g class="orb-c"><ellipse cx="600"  cy="290" rx="280" ry="200" fill="url(#orbPink)"/></g>
  <g class="orb-a"><ellipse cx="350"  cy="30"  rx="130" ry="130" fill="url(#orbOrange)"/></g>
  <g class="orb-b"><ellipse cx="870"  cy="270" rx="150" ry="150" fill="url(#orbPurple)"/></g>

  <!-- === TWINKLING STARS === -->
  <circle class="star" style="--d:1.8s" cx="50"   cy="20"  r="1.5" fill="white" opacity="0.8"/>
  <circle class="star" style="--d:2.3s" cx="180"  cy="45"  r="1"   fill="white" opacity="0.6"/>
  <circle class="star" style="--d:1.5s" cx="310"  cy="15"  r="2"   fill="white" opacity="0.9"/>
  <circle class="star" style="--d:3.1s" cx="430"  cy="55"  r="1"   fill="white" opacity="0.5"/>
  <circle class="star" style="--d:2.7s" cx="560"  cy="22"  r="1.5" fill="white" opacity="0.7"/>
  <circle class="star" style="--d:1.9s" cx="680"  cy="40"  r="1"   fill="white" opacity="0.6"/>
  <circle class="star" style="--d:2.5s" cx="800"  cy="18"  r="2"   fill="#a855f7" opacity="0.8"/>
  <circle class="star" style="--d:3.4s" cx="940"  cy="50"  r="1.5" fill="white" opacity="0.7"/>
  <circle class="star" style="--d:1.6s" cx="1060" cy="25"  r="1"   fill="white" opacity="0.5"/>
  <circle class="star" style="--d:2.2s" cx="1150" cy="60"  r="1.5" fill="#0ea5e9" opacity="0.9"/>
  <circle class="star" style="--d:2.9s" cx="70"   cy="220" r="1"   fill="white" opacity="0.4"/>
  <circle class="star" style="--d:1.7s" cx="200"  cy="250" r="1.5" fill="white" opacity="0.6"/>
  <circle class="star" style="--d:3.0s" cx="990"  cy="230" r="1"   fill="#ec4899" opacity="0.8"/>
  <circle class="star" style="--d:2.1s" cx="1130" cy="210" r="2"   fill="white" opacity="0.5"/>
  <circle class="star" style="--d:1.4s" cx="480"  cy="260" r="1"   fill="white" opacity="0.4"/>
  <circle class="star" style="--d:2.6s" cx="720"  cy="245" r="1.5" fill="white" opacity="0.7"/>

  <!-- === DECORATIVE LINES === -->
  <line x1="0" y1="280" x2="480" y2="280" stroke="url(#nameG)" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="720" y1="280" x2="1200" y2="280" stroke="url(#nameG)" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- === NAME TEXT === -->
  <!-- Glow shadow layer -->
  <text class="name" x="600" y="158" text-anchor="middle" fill="url(#nameG)" opacity="0.3" filter="url(#textGlow)">Abhishek Karthik J</text>
  <!-- Crisp layer -->
  <text class="name" x="600" y="158" text-anchor="middle" fill="url(#nameG)" filter="url(#softGlow)">Abhishek Karthik J</text>

  <!-- Divider line -->
  <line x1="420" y1="178" x2="780" y2="178" stroke="url(#subG)" stroke-width="1" stroke-opacity="0.5"/>

  <!-- === SUBTITLE === -->
  <text class="sub" x="600" y="210" text-anchor="middle" fill="url(#subG)" filter="url(#softGlow)" opacity="0.85">Chennai, India  ·  Open to Collaborate</text>
</svg>
