<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <!-- Deep synthwave sky gradient -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d0015"/>
      <stop offset="40%"  stop-color="#1a0030"/>
      <stop offset="70%"  stop-color="#2d0060"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>

    <!-- Sun gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="30%"  stop-color="#FF8C00"/>
      <stop offset="60%"  stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </linearGradient>

    <!-- Sun glow radial -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#FF1493" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B00FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Horizon glow -->
    <radialGradient id="horizonGlow" cx="50%" cy="0%" r="80%" fx="50%" fy="0%">
      <stop offset="0%"   stop-color="#FF1493" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#8B00FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d0015"  stop-opacity="0"/>
    </radialGradient>

    <!-- Grid fade gradient (top=transparent, bottom=opaque) -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF00FF" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#FF00FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Text neon gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFD700">
        <animate attributeName="stop-color" values="#FFD700;#FF8C00;#FF1493;#FFD700" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#00FFFF">
        <animate attributeName="stop-color" values="#00FFFF;#FF1493;#FFD700;#00FFFF" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF1493">
        <animate attributeName="stop-color" values="#FF1493;#00FFFF;#FF1493" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00FFFF">
        <animate attributeName="stop-color" values="#00FFFF;#FF1493;#00FFFF" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sunFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowText" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- Star pattern -->
    <symbol id="star" viewBox="0 0 4 4">
      <circle cx="2" cy="2" r="1" fill="white"/>
    </symbol>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="300" fill="url(#sky)"/>

  <!-- Stars layer -->
  <g opacity="0.9">
    <circle cx="50"   cy="20"  r="0.8" fill="#fff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="120"  cy="45"  r="1"   fill="#fff"><animate attributeName="opacity" values="0.5;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="200"  cy="15"  r="0.7" fill="#FFD7FF"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="310"  cy="30"  r="1"   fill="#fff"><animate attributeName="opacity" values="0.1;1;0.1" dur="4.1s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="420"  cy="10"  r="0.8" fill="#AAFFFF"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="540"  cy="35"  r="1"   fill="#fff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite" begin="1.5s"/></circle>
    <circle cx="680"  cy="18"  r="0.7" fill="#FFD7FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.7s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="780"  cy="42"  r="1"   fill="#fff"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.9s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="880"  cy="12"  r="0.8" fill="#AAFFFF"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.3s" repeatCount="indefinite" begin="1.2s"/></circle>
    <circle cx="950"  cy="28"  r="1"   fill="#fff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle cx="1050" cy="8"   r="0.7" fill="#FFD7FF"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite" begin="1.8s"/></circle>
    <circle cx="1130" cy="40"  r="1"   fill="#fff"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.2s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle cx="160"  cy="60"  r="0.6" fill="#fff"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s"   repeatCount="indefinite" begin="2s"/></circle>
    <circle cx="760"  cy="55"  r="0.6" fill="#AAFFFF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.7s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle cx="1000" cy="55"  r="0.8" fill="#fff"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite" begin="1.4s"/></circle>
  </g>

  <!-- === SUN GLOW (soft bloom behind sun) === -->
  <ellipse cx="600" cy="148" rx="160" ry="80" fill="url(#sunGlow)" filter="url(#softBlur)">
    <animate attributeName="rx" values="160;180;160" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="80;95;80"    dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Horizon light bleed -->
  <rect x="0" y="130" width="1200" height="170" fill="url(#horizonGlow)" opacity="0.6"/>

  <!-- === SUN === -->
  <!-- Sun main circle -->
  <clipPath id="sunClip">
    <rect x="490" y="80" width="220" height="68"/>
  </clipPath>
  <circle cx="600" cy="148" r="65" fill="url(#sunGrad)" filter="url(#sunFilter)" clip-path="url(#sunClip)">
    <animate attributeName="r" values="65;68;65" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Sun scan lines (horizontal cuts) -->
  <g clip-path="url(#sunClip)">
    <rect x="490" y="100" width="220" height="3" fill="#1a0030" opacity="0.9"/>
    <rect x="490" y="108" width="220" height="3" fill="#1a0030" opacity="0.9"/>
    <rect x="490" y="116" width="220" height="3" fill="#1a0030" opacity="0.9"/>
    <rect x="490" y="124" width="220" height="3" fill="#1a0030" opacity="0.9"/>
    <rect x="490" y="132" width="220" height="3" fill="#1a0030" opacity="0.9"/>
    <rect x="490" y="140" width="220" height="3" fill="#1a0030" opacity="0.9"/>
  </g>

  <!-- === PERSPECTIVE GRID === -->
  <!-- Horizon base line -->
  <line x1="0" y1="148" x2="1200" y2="148" stroke="#FF00FF" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Vertical grid lines converging to vanishing point (600, 148) -->
  <g stroke="url(#gridFade)" stroke-width="0.8" opacity="0.7">
    <line x1="600" y1="148" x2="0"    y2="300"/>
    <line x1="600" y1="148" x2="120"  y2="300"/>
    <line x1="600" y1="148" x2="240"  y2="300"/>
    <line x1="600" y1="148" x2="360"  y2="300"/>
    <line x1="600" y1="148" x2="480"  y2="300"/>
    <line x1="600" y1="148" x2="600"  y2="300"/>
    <line x1="600" y1="148" x2="720"  y2="300"/>
    <line x1="600" y1="148" x2="840"  y2="300"/>
    <line x1="600" y1="148" x2="960"  y2="300"/>
    <line x1="600" y1="148" x2="1080" y2="300"/>
    <line x1="600" y1="148" x2="1200" y2="300"/>
  </g>

  <!-- Horizontal grid lines (perspective scaled) -->
  <g stroke="#FF00FF" stroke-width="0.6" opacity="0.4">
    <line x1="0" y1="175" x2="1200" y2="175"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="222" x2="1200" y2="222"/>
    <line x1="0" y1="241" x2="1200" y2="241"/>
    <line x1="0" y1="258" x2="1200" y2="258"/>
    <line x1="0" y1="272" x2="1200" y2="272"/>
    <line x1="0" y1="284" x2="1200" y2="284"/>
    <line x1="0" y1="293" x2="1200" y2="293"/>
  </g>

  <!-- === SCANLINE OVERLAY (retro feel) === -->
  <rect width="1200" height="148" fill="transparent" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="0.1s" repeatCount="indefinite"/>
  </rect>

  <!-- === TEXT === -->
  <!-- Name shadow/glow layer -->
  <text x="600" y="76" text-anchor="middle"
        font-family="'Segoe UI', Arial Black, sans-serif"
        font-size="54" font-weight="900" letter-spacing="3"
        fill="#FF1493" filter="url(#softBlur)" opacity="0.8">
    Abhishek Karthik J
  </text>

  <!-- Name main text -->
  <text x="600" y="76" text-anchor="middle"
        font-family="'Segoe UI', Arial Black, sans-serif"
        font-size="54" font-weight="900" letter-spacing="3"
        fill="url(#nameGrad)" filter="url(#glowText)">
    Abhishek Karthik J
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Subtitle glow -->
  <text x="600" y="108" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="16" font-weight="600" letter-spacing="6"
        fill="#FF1493" filter="url(#softBlur)" opacity="0.6">
    AI  ·  ML  ·  FULL-STACK DEVELOPER
  </text>

  <!-- Subtitle text -->
  <text x="600" y="108" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="16" font-weight="600" letter-spacing="6"
        fill="url(#subGrad)" filter="url(#neonGlow)">
    AI  ·  ML  ·  FULL-STACK DEVELOPER
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze" begin="0.5s"/>
  </text>

  <!-- Location -->
  <text x="600" y="135" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" letter-spacing="3" fill="#00FFFF" opacity="0.85">
    📍 CHENNAI, INDIA
    <animate attributeName="opacity" values="0;0.85" dur="2s" fill="freeze" begin="1s"/>
  </text>

  <!-- === NEON SIDE DECORATION === -->
  <!-- Left neon line -->
  <g filter="url(#neonGlow)">
    <line x1="30" y1="148" x2="370" y2="148" stroke="#FF1493" stroke-width="1.5" opacity="0.7">
      <animate attributeName="x2" values="370;420;370" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </line>
    <!-- Right neon line -->
    <line x1="1170" y1="148" x2="830" y2="148" stroke="#FF1493" stroke-width="1.5" opacity="0.7">
      <animate attributeName="x2" values="830;780;830" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Corner accent dots -->
  <circle cx="30"   cy="148" r="3" fill="#FF1493" filter="url(#neonGlow)">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1170" cy="148" r="3" fill="#FF1493" filter="url(#neonGlow)">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- === TOP BORDER NEON LINE === -->
  <rect x="0" y="0" width="1200" height="2" fill="#FF1493" opacity="0.5" filter="url(#neonGlow)"/>

  <!-- === BOTTOM BORDER NEON LINE === -->
  <rect x="0" y="298" width="1200" height="2" fill="#00FFFF" opacity="0.5" filter="url(#neonGlow)"/>

</svg>
